# 文档同步规则（机器可读版）
#
# 用途：约束"改动代码时必须同步对应文档"，由 scripts/check_docs_sync.py 强制执行。
#
# 字段说明：
#   id           - 规则唯一标识（用于报错定位）
#   description  - 规则描述
#   when_changed - 触发规则的文件 glob 列表（任一命中即触发）
#   must_update  - 触发后必须同时改的文档（任一缺失即违规）
#   severity     - error（阻止提交）| warning（仅提醒）
#   rationale    - 为什么这条规则重要（给开发者/Agent 看）
#
# Glob 语法：
#   *   - 匹配除 / 外的任意字符
#   **  - 跨目录递归匹配
#   ?   - 匹配单个非 / 字符
#
# 修改本文件后请运行 `python scripts/check_docs_sync.py --self-check` 验证 yaml 合法。

version: 1

defaults:
  severity: warning

rules:
  # ---- 数据库与索引 schema ----
  - id: mysql-schema
    description: MySQL DDL 或 ORM 变更
    when_changed:
      - scripts/db/init.sql
      - src/models/**/*.py
    must_update:
      - docs/reference/mysql_schema.md
    severity: error
    rationale: 数据库 schema 是 Java/Python 双方契约，未同步会导致集成方误用字段。

  - id: qdrant-schema
    description: Qdrant 向量库实现变更
    when_changed:
      - src/core/qdrant_vector_storage/**/*.py
    must_update:
      - docs/reference/qdrant_schema.md
    severity: warning
    rationale: 分桶规则、payload 字段变化影响检索行为。

  - id: es-schema
    description: Elasticsearch 入库实现变更
    when_changed:
      - src/core/es_index_storage/**/*.py
    must_update:
      - docs/reference/elasticsearch_schema.md
    severity: warning
    rationale: ES 文档结构、索引名变化影响检索方对接。

  # ---- MQ 契约（业务方对接关键）----
  - id: mq-contracts
    description: MQ 消息载荷或类型变更
    when_changed:
      - src/core/mq/messages/**/*.py
    must_update:
      - docs/guides/mq_integration.md
      - docs/architecture/mq_module.md
    severity: error
    rationale: MQ 消息是 Java 业务方对接契约，字段缺失或类型变化必须同步通知。

  - id: mq-module
    description: MQ 中间件、消费者、生产者变更（非消息体）
    when_changed:
      - src/core/mq/**/*.py
    must_update:
      - docs/architecture/mq_module.md
    severity: warning
    rationale: 消费链路或生产者行为变化影响整体异步流。

  # ---- 业务模块 ----
  - id: parser-module
    description: 文件解析器变更
    when_changed:
      - src/core/parser/**/*.py
    must_update:
      - docs/architecture/file_parser_module.md
    severity: warning
    rationale: 解析后端切换、回退链变化影响使用方配置。

  - id: markdown-parser-module
    description: Markdown 解析与 LLM 增强变更
    when_changed:
      - src/core/markdown_parser/**/*.py
    must_update:
      - docs/architecture/markdown_parser_module.md
    severity: warning
    rationale: 表格/图片增强逻辑变化影响输出质量与成本。

  - id: chunking-module
    description: 分块策略与流水线变更
    when_changed:
      - src/core/splitter/**/*.py
    must_update:
      - docs/architecture/chunking_module.md
    severity: warning
    rationale: 分块参数与边界规则变化影响召回。

  - id: vectorization-module
    description: 向量化模块变更
    when_changed:
      - src/core/vector_storage/**/*.py
    must_update:
      - docs/architecture/vectorization_module.md
    severity: warning

  - id: llm-module
    description: LLM 调用模块变更
    when_changed:
      - src/core/llm/**/*.py
    must_update:
      - docs/architecture/llm_module.md
    severity: warning

  - id: pipeline-orchestration
    description: 解析任务流水线编排或状态机变更
    when_changed:
      - src/core/pipeline/**/*.py
    must_update:
      - docs/architecture/parse_task_pipeline_module.md
    severity: error
    rationale: 流水线状态机变更涉及 success/failed 终态语义，必须同步对外文档。

  # ---- API 与对外契约 ----
  - id: api-routes
    description: HTTP 路由变更
    when_changed:
      - src/api/routes/**/*.py
    must_update:
      - docs/reference/api_contracts.md
    severity: warning
    rationale: 接口签名变更影响业务方对接。

  - id: api-schemas
    description: HTTP 请求/响应 Schema 变更
    when_changed:
      - src/api/schemas/**/*.py
    must_update:
      - docs/reference/api_contracts.md
    severity: warning

  # ---- 配置与部署 ----
  - id: runtime-config
    description: 运行时配置 Schema 变更
    when_changed:
      - src/config.py
      - .env.example
    must_update:
      - docs/guides/configuration.md
    severity: warning
    rationale: 新增/删除配置项影响部署方与使用方。

  - id: deps-deploy
    description: 依赖编排变更
    when_changed:
      - docker-compose.yml
    must_update:
      - docs/guides/deployment.md
    severity: warning
    rationale: 依赖服务清单变化影响部署文档准确性。

  - id: project-layout
    description: 顶层目录或入口文件变化
    when_changed:
      - src/main.py
      - pyproject.toml
    must_update:
      - docs/architecture/project_structure.md
    severity: warning

  # ---- 入口文档双向同步 ----
  - id: claude-md-mirror
    description: CLAUDE.md 变化必须同步到 AGENTS.md
    when_changed:
      - CLAUDE.md
    must_update:
      - AGENTS.md
    severity: error
    rationale: CLAUDE.md 与 AGENTS.md 是 Claude/Codex 两套 Agent 的统一入口，必须字字一致。

  - id: agents-md-mirror
    description: AGENTS.md 变化必须同步到 CLAUDE.md
    when_changed:
      - AGENTS.md
    must_update:
      - CLAUDE.md
    severity: error

  # ---- 同步规则自身 ----
  - id: sync-rules-doc
    description: 同步规则本身变化必须更新使用文档
    when_changed:
      - .claude/doc-sync-rules.yaml
      - scripts/check_docs_sync.py
    must_update:
      - docs/development/doc_sync.md
    severity: warning
    rationale: 规则或检测逻辑变化要让团队知道。
