[alembic]
# Alembic 配置：迁移脚本目录
script_location = migrations

# 文件命名模板：版本号 + 时间戳 + slug
file_template = %%(rev)s_%%(year)d%%(month).2d%%(day).2d_%%(slug)s

# 时区
timezone = UTC

# 默认 sqlalchemy.url 为空，运行时由 migrations/env.py 从 src.config.settings.DATABASE_URL 注入
sqlalchemy.url =

[post_write_hooks]
# 暂不配置 black/isort 自动格式化

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
