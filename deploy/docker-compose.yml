# 部署用 compose：引用本机 docker build 出来的镜像并启动
# 外部依赖（MySQL/Redis/MinIO/ES/Qdrant/Kafka）由根目录 docker-compose.yml 单独拉起
# 用法：TAG=xxx docker compose -f deploy/docker-compose.yml up -d
services:
  tolink-rag:
    image: tolink-rag:${TAG:-latest}
    container_name: tolink-rag
    restart: always
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      # 日志持久化到宿主机，避免容器重建（每次重新部署）丢失按日期归档的日志文件。
      # 相对路径以本 compose 文件所在目录为基准（与 ../.env 同级），即部署目录根
      # /opt/tolink/toLink-Rag/logs/<YYYY-MM-DD>/...。需保持 .env 中 LOG_DIR=logs（相对路径）。
      - ../logs:/app/logs
    networks:
      - tolink-app-net
    # 启动前如需执行 Alembic 迁移，可改用：
    # command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

networks:
  tolink-app-net:
    external: true
