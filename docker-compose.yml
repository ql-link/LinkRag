services:
  mysql:
    image: mysql:8.0
    container_name: tolink-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "ql354210"
      MYSQL_DATABASE: tolink_rag_db
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci'
    ]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pql354210"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: tolink-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ql354210
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ql354210", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: tolink-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: ql354210
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: tolink-es
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=ql354210
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - tolink-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tolink-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - tolink-net

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: tolink-zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - tolink-net
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/zookeeper/bin/zkServer.sh status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: tolink-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=tolink-zookeeper:2181
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://tolink-kafka:29092,EXTERNAL://36.213.180.176:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_INTER_BROKER_USER=root
      - KAFKA_INTER_BROKER_PASSWORD=ql354210
      - KAFKA_CLIENT_USERS=root
      - KAFKA_CLIENT_PASSWORDS=ql354210
    networks:
      - tolink-net
    volumes:
      - kafka_data:/bitnami/kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'cat >/tmp/kafka_client.properties <<EOF\nsecurity.protocol=SASL_PLAINTEXT\nsasl.mechanism=PLAIN\nsasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"'\"$${KAFKA_CLIENT_USERS}\"'\" password=\"'\"$${KAFKA_CLIENT_PASSWORDS}\"'\";\nEOF\nkafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /tmp/kafka_client.properties >/dev/null 2>&1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tolink-kafka-ui
    restart: always
    ports:
      - "9081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=tolink-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=tolink-kafka:29092
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=SASL_PLAINTEXT
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM=PLAIN
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="root" password="ql354210";
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - tolink-net
    depends_on:
      kafka:
        condition: service_healthy

networks:
  tolink-net:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  es_data:
  qdrant_data:
  zookeeper_data:
  kafka_data:
