services:
  mysql:
    image: mysql:8.0
    container_name: tolink-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "ql354210"
      MYSQL_DATABASE: tolink_rag_db
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci'
    ]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pql354210"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: tolink-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ql354210
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ql354210", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tolink-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: ql354210
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: tolink-etcd
    restart: always
    environment:
      - ETCD_NAME=etcd-1
      - ETCD_DATA_DIR=/etcd_data
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    networks:
      - tolink-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.3.1
    container_name: tolink-milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: root
      MINIO_SECRET_ACCESS_KEY: ql354210
      MILVUS_COMMON_SECURITY_AUTHORIZATION: "false"
      COMMON_SECURITY_AUTHORIZATION: "false"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - tolink-net

  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: tolink-es
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=ql354210
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - tolink-net

networks:
  tolink-net:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  milvus_data:
  es_data: